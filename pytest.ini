[pytest]
# Test discovery and execution
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async support
asyncio_mode = auto

# Markers for test categorization
markers =
    xwentity_core: Core functionality and integration tests
    xwentity_unit: Unit tests for individual components
    xwentity_integration: Integration tests across modules
    xwentity_advance: Advance quality tests (v1.0.0+)
    xwentity_security: Security excellence tests (Priority #1)
    xwentity_usability: Usability excellence tests (Priority #2)
    xwentity_maintainability: Maintainability excellence tests (Priority #3)
    xwentity_performance: Performance excellence tests (Priority #4)
    xwentity_extensibility: Extensibility excellence tests (Priority #5)
    xwmodels_core: Core functionality and integration tests
    xwmodels_unit: Unit tests for individual components
    xwmodels_integration: Integration tests across modules

# Test output configuration
addopts =
    -v
    --tb=short
    --strict-markers
    -x

