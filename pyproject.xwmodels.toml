# Source size (src/*): ~219.6 KB
[build-system]
requires = [
    "hatchling",
]
build-backend = "hatchling.build"

[project]
name = "xwmodels"
dynamic = [
    "version",
]
description = "Convenience wrapper for exonware-xwmodels - provides 'import xwmodels' alias"
readme = "README.md"
requires-python = ">=3.12"
keywords = [
    "collections",
    "groups",
    "models",
    "organization",
    "exonware",
]
classifiers = []
dependencies = [
    "exonware-xwmodels",
]
authors = [
    { name = "eXonware Backend Team", email = "connect@exonware.com" },
]

[project.license]
text = "MIT"

[project.optional-dependencies]
dev = [
    "exonware-xwmodels[dev]",
]
lazy = [
    "exonware-xwmodels[lazy]",
]
full = [
    "exonware-xwmodels[full]",
]

[project.urls]
Homepage = "https://exonware.com"
Documentation = "https://github.com/exonware/xwmodels#readme"
Repository = "https://github.com/exonware/xwmodels"

[tool.black]
line-length = 88
target-version = [
    "py312",
]

[tool.isort]
profile = "black"
line_length = 88

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_any_generics = true
disallow_untyped_calls = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true

[tool.pytest.ini_options]
testpaths = [
    "tests",
]
python_files = [
    "test_*.py",
]
python_classes = [
    "Test*",
]
python_functions = [
    "test_*",
]
addopts = "-v --tb=short"
markers = []

[tool.hatch.version]
path = "src/exonware/xwmodels/version.py"

[tool.hatch.build.targets.wheel]
only-include = [
    "README.md",
    "src/xwmodels_wrapper.py",
]

[tool.hatch.build.targets.sdist]
include = [
    "/src",
    "/tests",
    "/README.md",
    "/.github",
]
